<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naver Map</title>
    <script type="text/javascript" src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=k577f0ry39"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
        }
        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        console.log('HTML 로드됨');
        console.log('window.initialLocation:', window.initialLocation);

        function initializeMap() {
            console.log('Map 초기화 시작');

            const initialLat = window.initialLocation?.latitude || 37.5665;
            const initialLng = window.initialLocation?.longitude || 126.9780;

            console.log('초기 위치:', { initialLat, initialLng });

            try {
                const mapOptions = {
                    center: new naver.maps.LatLng(initialLat, initialLng),
                    zoom: 15
                };

                const map = new naver.maps.Map('map', mapOptions);
                console.log('✅ 지도 생성 완료');

                naver.maps.Event.addListener(map, 'click', function(e) {
                    const lat = e.coord.lat();
                    const lng = e.coord.lng();
                    console.log('지도 클릭:', { lat, lng });
                    window.ReactNativeWebView.postMessage(JSON.stringify({
                        latitude: lat,
                        longitude: lng
                    }));
                });
            } catch (error) {
                console.error('❌ 지도 생성 오류:', error);
            }
        }

        if (window.naver && window.naver.maps) {
            console.log('naver.maps 이미 로드됨');
            initializeMap();
        } else {
            console.log('naver.maps 로드 대기 중...');
            window.addEventListener('load', function() {
                console.log('window load 이벤트');
                if (window.naver && window.naver.maps) {
                    initializeMap();
                } else {
                    console.error('naver.maps를 찾을 수 없음');
                }
            });

            let attempts = 0;
            const checkInterval = setInterval(function() {
                attempts++;
                if (window.naver && window.naver.maps) {
                    clearInterval(checkInterval);
                    initializeMap();
                } else if (attempts > 50) {
                    clearInterval(checkInterval);
                    console.error('naver.maps 로드 실패');
                }
            }, 100);
        }
    </script>
</body>
</html>
